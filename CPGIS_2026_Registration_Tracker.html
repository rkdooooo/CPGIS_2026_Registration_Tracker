<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CPGIS 2026 — Registration Tracker</title>
<style>
:root{
  --reg:#16a34a; --reg-bg:#dcfce7; --pend:#d97706; --pend-bg:#fef3c7;
  --miss:#e11d48; --miss-bg:#ffe4e6; --waiv:#2563eb; --waiv-bg:#dbeafe;
  --ink:#0f172a; --muted:#64748b; --line:#e5e9f0; --bg:#f1f5f9; --card:#fff;
  --GFM:#6366f1; --LEA:#16a34a; --GSC:#0891b2; --UPS:#db2777;
  --REE:#0d9488; --CED:#ea580c; --TMU:#7c3aed; --HEI:#e11d48;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
header{background:linear-gradient(125deg,#0b3a55,#0e7490 60%,#0891b2);color:#fff;padding:14px 24px 0}
.hbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.htitle{font-size:17px;font-weight:700}
.hsub{font-size:11.5px;opacity:.8}
.edbox{display:flex;align-items:center;gap:6px;font-size:12px;color:#cbeef7}
.edbox input{padding:5px 9px;width:120px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:7px;color:#fff;font-size:12.5px}
.edbox input::placeholder{color:#bae6fd}
.hero{display:flex;align-items:center;gap:26px;flex-wrap:wrap;margin:14px 0 4px}
.hero-num{display:flex;align-items:baseline;gap:12px}
.hero-num b{font-size:52px;font-weight:800;line-height:.9;letter-spacing:-1px}
.hero-num .lab{font-size:14px;opacity:.92;max-width:200px;line-height:1.2}
.hero-right{display:flex;align-items:center;gap:14px;margin-left:auto}
.ring{width:66px;height:66px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto}
.ring::before{content:'';position:absolute;width:48px;height:48px;border-radius:50%;background:#0b4a63}
.ring span{position:relative;font-size:15px;font-weight:800}
.hbreak{font-size:12.5px;opacity:.92;line-height:1.5}
.hbreak b{font-size:14px}
.dotrow{display:flex;gap:5px;align-items:center}
.tabs{display:flex;gap:4px;margin-top:12px}
.tab{background:transparent;border:0;color:#cbeef7;padding:9px 18px;border-radius:9px 9px 0 0;cursor:pointer;font-size:13.5px;font-weight:700}
.tab.active{background:var(--bg);color:var(--ink)}
.tab:hover:not(.active){background:rgba(255,255,255,.12);color:#fff}
main{padding:18px 24px 70px;max-width:1320px;margin:0 auto}
.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
input[type=search],input.txt,select{border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:13px;background:#fff;color:var(--ink)}
input[type=search]{min-width:230px}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
.btn:hover{background:#eef2f7}
.btn.primary{background:#0891b2;border-color:#0891b2;color:#fff}
.btn.primary:hover{background:#0e7490}
.chk{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink);cursor:pointer;user-select:none;background:#fff;border:1px solid var(--line);padding:7px 12px;border-radius:9px;font-weight:600}
.chk input{accent-color:#0891b2}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);align-items:center}
.legend span{display:inline-flex;align-items:center;gap:6px}
.lg-seat{width:15px;height:15px;border-radius:50%;display:inline-block}
.lg-reg{background:var(--reg)}
.lg-pend{background:repeating-linear-gradient(135deg,var(--pend-bg) 0 3px,var(--pend) 3px 5px);border:1px solid var(--pend)}
.lg-miss{background:#fff;border:2px dashed var(--miss)}
.lg-waiv{background:var(--waiv);border:0}
/* ---- parallel-session section ---- */
.psec{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)}
.psec-head{display:flex;align-items:center;gap:14px;padding:13px 18px;background:linear-gradient(90deg,#f8fafc,#fff);border-bottom:1px solid var(--line);cursor:pointer}
.psec-num{width:34px;height:34px;border-radius:9px;background:#0e7490;color:#fff;display:grid;place-items:center;font-weight:800;font-size:15px;flex:0 0 auto}
.psec-t{font-weight:800;font-size:15px}
.psec-s{font-size:12px;color:var(--muted);margin-top:1px}
.psec-meta{margin-left:auto;display:flex;align-items:center;gap:10px}
.psec-gap{font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:99px}
.psec-gap.has{background:var(--miss-bg);color:var(--miss)}
.psec-gap.done{background:var(--reg-bg);color:var(--reg)}
.tables{display:flex;flex-wrap:wrap;gap:16px;padding:18px}
/* ---- a round table ---- */
.table{width:186px;border-radius:14px;padding:10px 10px 12px;cursor:pointer;border:1px solid var(--line);background:#fff;transition:transform .12s,box-shadow .12s;position:relative}
.table:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(15,23,42,.12)}
.table.done{opacity:.62}
.table.done:hover{opacity:1}
.table.gap{border-color:#fecdd3;box-shadow:0 0 0 1px #fecdd3}
.tbadge{position:absolute;top:8px;right:8px;min-width:22px;height:22px;padding:0 6px;border-radius:99px;font-size:12px;font-weight:800;display:grid;place-items:center;color:#fff;background:var(--miss)}
.tbadge.done{background:var(--reg)}
.tsvg{display:block;margin:2px auto 4px}
.tcode{text-align:center;font-weight:800;font-size:13px}
.tname{text-align:center;font-size:11px;color:var(--muted);line-height:1.25;margin-top:3px;height:28px;overflow:hidden}
.troom{text-align:center;font-size:10.5px;color:#94a3b8;margin-top:5px}
.seat{cursor:pointer}
.seat-reg{fill:var(--reg);stroke:#fff;stroke-width:2}
.seat-pend{fill:var(--pend-bg);stroke:var(--pend);stroke-width:1.8}
.seat-miss{fill:#fff;stroke:var(--miss);stroke-width:2.4;stroke-dasharray:3 2}
.seat-waiv{fill:var(--waiv);stroke:#fff;stroke-width:2}
.ttop{fill:#f8fafc;stroke-width:2}
/* ---- list / table ---- */
table.lst{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
.lst th,.lst td{text-align:left;padding:8px 10px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:top}
.lst th{background:#f8fafc;cursor:pointer;white-space:nowrap;position:sticky;top:0;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}
.lst tr:hover td{background:#fafcff;cursor:pointer}
.stpill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:6px;color:#fff}
.badge-also{font-size:10px;background:#ede9fe;color:#6d28d9;padding:1px 6px;border-radius:6px;font-weight:700}
.editmark{color:#0891b2;font-weight:800}
/* ---- modal ---- */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.34)}
.m-head{padding:16px 20px;color:#fff}
.m-head .mh-code{font-size:13px;font-weight:800;opacity:.95}
.m-head .mh-name{font-size:18px;font-weight:800;margin-top:2px}
.m-head .mh-sub{font-size:12px;opacity:.92;margin-top:6px;line-height:1.5}
.m-body{padding:8px 20px 16px}
.prow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;padding:11px 0;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:0}
.prow .pwho{font-weight:700;font-size:13px}
.prow .pti{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35}
.prow .pid{font-size:10.5px;color:#94a3b8;font-variant-numeric:tabular-nums}
.segbtns{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.segbtns button{border:0;background:#fff;padding:6px 9px;font-size:14px;cursor:pointer;border-left:1px solid var(--line);line-height:1}
.segbtns button:first-child{border-left:0}
.segbtns button.on{box-shadow:inset 0 0 0 2px currentColor}
.noteline{margin-top:7px}
.noteline input{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px}
.m-foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;align-items:center}
.meta-line{font-size:11.5px;color:var(--muted)}
.special-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
.special-card h3{margin:0 0 4px;font-size:15px}
.special-card .desc{font-size:12.5px;color:var(--muted);margin-bottom:10px;max-width:780px}
.scope-note{background:#ecfeff;border:1px solid #a5f3fc;border-radius:14px;padding:14px 16px;margin-bottom:14px;color:#164e63;font-size:12.5px;line-height:1.55}
.scope-note b{color:#0e7490}
.statgrid{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.statcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;text-align:left;color:var(--ink)}
.statcard:hover{border-color:#67e8f9;box-shadow:0 4px 14px rgba(15,23,42,.07)}
.statcard b{display:block;font-size:22px;line-height:1.1}
.statcard span{font-size:11.5px;color:var(--muted);line-height:1.3}
.flag{display:inline-block;font-size:10px;font-weight:750;padding:2px 7px;border-radius:99px;margin:1px 3px 1px 0;white-space:nowrap}
.flag-paid{background:#dcfce7;color:#166534}.flag-multi{background:#fef3c7;color:#92400e}
.flag-student{background:#e0f2fe;color:#075985}.flag-decision{background:#ffe4e6;color:#9f1239}
.flag-noprogram{background:#f1f5f9;color:#475569}.flag-dual{background:#ede9fe;color:#6d28d9}
.flag-eligible{background:#dbeafe;color:#1d4ed8}
.secondary-talk{border-left:3px solid #8b5cf6;padding-left:10px}
.mini-list{font-size:12.5px}
.mini-list .ml{padding:7px 0;border-bottom:1px dashed var(--line);display:flex;gap:10px;align-items:center}
.mini-list .ml:last-child{border-bottom:0}
code.k{background:#eef2f7;padding:1px 6px;border-radius:5px;font-size:11.5px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;z-index:60;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
.empty{padding:40px;text-align:center;color:var(--muted)}
@media(max-width:700px){.statgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}

/* Minimal academic interface */
:root{
  --reg:#248a3d;--reg-bg:#eef8f0;--pend:#b25b00;--pend-bg:#fff6e8;
  --miss:#c9342f;--miss-bg:#fff1f0;--waiv:#0071e3;--waiv-bg:#eaf2ff;
  --ink:#1d1d1f;--muted:#6e6e73;--line:#dfe0e5;--bg:#f5f5f7;--card:#fff;
  --GFM:#0071e3;--LEA:#0071e3;--GSC:#0071e3;--UPS:#0071e3;
  --REE:#0071e3;--CED:#0071e3;--TMU:#0071e3;--HEI:#0071e3;
}

.hbar,.hero,.tabs{max-width:1180px;margin-left:auto;margin-right:auto}

.dotrow{gap:7px}
.ring{width:56px;height:56px}

.tab.active{background:transparent;color:var(--ink);border-bottom-color:var(--ink)}

main{max-width:1180px;padding:28px 28px 72px}
.toolbar{gap:8px;margin-bottom:18px}
input[type=search],input.txt,select{height:38px;border:1px solid transparent;border-radius:10px;padding:8px 12px;background:#fff;color:var(--ink);box-shadow:0 0 0 1px rgba(0,0,0,.06);font-size:13px}

.chk input{accent-color:#0071e3}

code.k{background:#f2f2f7;color:#515154}
details.review-detail{background:#fff;border-radius:16px;margin-bottom:10px;box-shadow:0 0 0 1px rgba(0,0,0,.055)}
details.review-detail summary{list-style:none;cursor:pointer;padding:15px 18px;font-size:13px;font-weight:600;display:flex;justify-content:space-between;gap:14px}
details.review-detail summary::-webkit-details-marker{display:none}
details.review-detail summary::after{content:"+";color:var(--muted);font-size:17px;font-weight:400}
details.review-detail[open] summary::after{content:"−"}
details.review-detail .detail-body{padding:0 18px 16px;color:var(--muted);font-size:12px;line-height:1.55;border-top:1px solid #ededf0}
.filter-more{position:relative}
.filter-more summary{height:38px;display:flex;align-items:center;list-style:none;cursor:pointer;background:#fff;border-radius:10px;padding:0 12px;color:var(--muted);font-size:12.5px;box-shadow:0 0 0 1px rgba(0,0,0,.06)}
.filter-more summary::-webkit-details-marker{display:none}
.filter-more[open] summary{color:var(--ink)}
.filter-panel{display:flex;gap:8px;position:absolute;z-index:10;top:46px;left:0;background:#fff;padding:10px;border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.14)}
.review-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600;white-space:nowrap}
.review-none{background:#f2f2f7;color:#6e6e73}.review-verified{background:var(--reg-bg);color:var(--reg)}
.review-followup{background:var(--pend-bg);color:var(--pend)}.review-corrected{background:#eaf2ff;color:#0066cc}
.check-summary{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:14px;box-shadow:0 0 0 1px rgba(0,0,0,.055)}
.check-summary>div:first-child{display:flex;align-items:baseline;gap:10px}.check-summary .eyebrow{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.check-summary b{font-size:26px;letter-spacing:-.04em}.check-summary>div:first-child>span:last-child{color:var(--muted);font-size:12px}
.check-counts{display:flex;gap:14px;color:var(--muted);font-size:11px}
.check-table-wrap{overflow:auto;max-height:68vh;border-radius:14px}
.check-table td{white-space:nowrap}.check-table td:nth-child(3),.check-table td:nth-child(9){max-width:180px;overflow:hidden;text-overflow:ellipsis}
.compare-changed{color:#0066cc;font-weight:600}.compare-same{color:var(--muted)}
.review-form{display:grid;gap:14px;padding-top:18px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.compare-grid>div{background:#f5f5f7;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.compare-grid span,.review-form label{font-size:11px;color:var(--muted)}
.compare-grid b{font-size:12.5px;color:var(--ink)}
.review-form label{display:grid;gap:6px}
.review-form select,.review-form textarea{width:100%;border:0;background:#f5f5f7;border-radius:10px;padding:10px 12px;color:var(--ink);font:inherit}
.review-form textarea{min-height:84px;resize:vertical}
.review-history{font-size:10.5px;color:var(--muted)}
.manual-panel{background:#fff;border-radius:14px;padding:14px;box-shadow:0 0 0 1px rgba(0,0,0,.055)}
.manual-panel h3{margin:0 0 8px;font-size:13px;font-weight:650}
.manual-help{font-size:11.5px;color:var(--muted);line-height:1.45;margin-bottom:10px}
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.manual-grid label{display:grid;gap:6px;font-size:11px;color:var(--muted)}
.manual-grid textarea,.manual-grid select{width:100%;border:0;background:#f5f5f7;border-radius:10px;padding:10px 12px;color:var(--ink);font:inherit}
.manual-grid textarea{min-height:74px;resize:vertical;grid-column:1/-1}
.manual-meta{font-size:10.5px;color:var(--muted);margin-top:8px}
.history-list{display:grid;gap:7px;margin-top:8px}
.history-item{background:#f5f5f7;border-radius:10px;padding:9px 11px;font-size:11px;color:var(--muted);line-height:1.45}
.history-item b{color:var(--ink);font-weight:600}
.history-empty{font-size:11px;color:var(--muted);padding:6px 0}
.audit-table td:nth-child(4){max-width:360px;white-space:normal}
.audit-actions{display:flex;gap:8px;flex-wrap:wrap}
.sync-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-top:10px}
.sync-grid label{display:grid;gap:5px;font-size:11px;color:var(--muted)}
.sync-grid input{height:38px;border:0;background:#f5f5f7;border-radius:10px;padding:8px 12px;color:var(--ink);font:inherit;font-size:12px}
.sync-state{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.45}
.known-info{background:#f5f9ff;border:1px solid #dbeafe;border-radius:12px;padding:12px 14px;color:#334155;font-size:11.5px;line-height:1.5}
.known-info b{display:block;color:#1d1d1f;font-size:11px;margin-bottom:3px}
.known-source{display:inline-block;margin-left:5px;color:#64748b;font-size:10px;font-weight:500}
.related-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.related-link{border:0;background:#fff;color:#0071e3;border-radius:999px;padding:5px 9px;font-size:10.5px;cursor:pointer;box-shadow:0 0 0 1px rgba(0,113,227,.16)}
.author-verified{display:block;color:#0071e3;font-size:10px;font-weight:600;margin-top:2px}
.review-actions{flex-wrap:wrap}
.toast{background:rgba(29,29,31,.92);border-radius:999px;font-size:12px}
@media(max-width:900px){.tables{grid-template-columns:repeat(2,minmax(0,1fr))}.statgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:700px){
  header{padding:14px 18px 0}.hbar{align-items:flex-start}.htitle{font-size:18px}.hsub{max-width:300px}
  .hero{margin-top:18px}.hero-num b{font-size:42px}.hero-right{margin-left:0;width:100%;justify-content:space-between}
  .ring{display:none}.tabs{gap:20px}.tab{font-size:12.5px}
  main{padding:20px 14px 56px}.toolbar{align-items:stretch}input[type=search]{width:100%;min-width:0}
  .legend{width:100%;justify-content:flex-start}.tables{grid-template-columns:1fr 1fr;gap:8px}
  .table{min-height:242px;padding:13px}.statgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .prow{grid-template-columns:1fr}.segbtns{justify-self:start}.special-card,.scope-note{padding:15px}.filter-panel{position:fixed;left:14px;right:14px;top:auto;flex-wrap:wrap}
  .check-summary{align-items:flex-start;flex-direction:column}.check-counts{flex-wrap:wrap}.compare-grid,.manual-grid{grid-template-columns:1fr}
}
@media(max-width:430px){.tables{grid-template-columns:1fr}.hero-num .lab{max-width:180px}.statgrid{grid-template-columns:1fr 1fr}}

      if(r.note)clean.note=r.note;

function sessionTalks(code){return SUBMISSIONS.filter(s=>inSession(s,code))}
function surname(a){if(!a)return"";return (a.split(/,| and /)[0]||a).trim()}
function lc(s){return (s||"").toLowerCase()}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function counts(list){const c={total:list.length,registered:0,pending:0,missing:0,waived:0};
  list.forEach(s=>c[effStatus(s)]++);c.outstanding=c.missing+c.pending;c.denom=c.total-c.waived;
  c.pct=c.denom?Math.round(100*c.registered/c.denom):100;return c;}

/* ---------- THE ROOM (tables) ---------- */
let roomFocus=false, roomQ="",roomLayout=URL_STATE.get("layout")==="type"?"type":"time";
function viewTables(){
  return `<div class="toolbar">
      <input type="search" id="rq" placeholder="Search sessions, titles or authors" value="${esc(roomQ)}">
      <label class="chk"><input type="checkbox" id="rfocus" ${roomFocus?"checked":""}> Open records only</label>
      <div class="view-switch" role="group" aria-label="Session arrangement">
        <button type="button" data-room-layout="time" class="${roomLayout==="time"?"active":""}">By time</button>

      </div>

        <span><i class="lg-seat lg-reg"></i>registered</span>
        <span><i class="lg-seat lg-pend"></i>pending</span>

        <span><i class="lg-seat lg-waiv"></i>waived</span>
      </div></div>
    <div id="roomBody">${roomBody()}</div>`;
}
function matchQ(s,q){if(!q)return true;q=lc(q);const k=knownInfo(s);return lc(s.title).includes(q)||lc(s.authors).includes(q)||lc(k.realName).includes(q)||lc(k.note).includes(q)||lc(s.id).includes(q)||lc(s.sessionId).includes(q)||lc(note(s)).includes(q)}
function sessionVisible(code){
  const all=sessionTalks(code);
  return (!roomQ||all.some(s=>matchQ(s,roomQ)))&&(!roomFocus||all.some(outstanding));
}
function roomBody(){
  return roomLayout==="type"?roomBodyByType():roomBodyByTime();
}
function roomBodyByTime(){
  let html="";
  for(let n=1;n<=8;n++){
    const codes=Object.keys(SESSIONS).filter(c=>SESSIONS[c].num===n).sort((a,b)=>TORDER.indexOf(a.slice(0,3))-TORDER.indexOf(b.slice(0,3)));
    let tables="";
    let secList=[];
    codes.forEach(code=>{
      secList=secList.concat(sessionTalks(code));
      if(!sessionVisible(code))return;
      tables+=tableCard(code);
    });
    if(tables==="")continue;
    const cc=counts(secList);const t=SESSIONS[codes[0]];
    html+=`<div class="psec">
      <div class="psec-head" onclick="this.parentNode.querySelector('.tables').classList.toggle('hidden')">
        <div class="psec-num">${n}</div>
        <div><div class="psec-t">Parallel Session ${n}</div><div class="psec-s">${PS_DAY[n]} · ${t.time} · ${codes.length} sessions</div></div>
        <div class="psec-meta"><span class="psec-gap ${cc.outstanding?'has':'done'}">${cc.outstanding?cc.outstanding+' open':'complete'}</span></div>
      </div>
      <div class="tables">${tables}</div></div>`;
  }
  return html||'<div class="empty">No tables match your search.</div>';
}
function roomBodyByType(){
  let html="";
  TORDER.forEach(type=>{
    const codes=Object.keys(SESSIONS).filter(c=>c.slice(0,3)===type)
      .sort((a,b)=>SESSIONS[a].num-SESSIONS[b].num);
    const visible=codes.filter(sessionVisible);
    if(!visible.length)return;
    const secList=visible.flatMap(sessionTalks),cc=counts(secList);
    html+=`<div class="psec">
      <div class="psec-head" onclick="this.parentNode.querySelector('.tables').classList.toggle('hidden')">
        <div class="psec-num psec-code">${type}</div>
        <div><div class="psec-t">${esc(TRACKS[type]||type)}</div><div class="psec-s">${visible.length} sessions · ${secList.length} presentations</div></div>
        <div class="psec-meta"><span class="psec-gap ${cc.outstanding?'has':'done'}">${cc.outstanding?cc.outstanding+' open':'complete'}</span></div>
      </div>
      <div class="tables">${visible.map(tableCard).join("")}</div></div>`;
  });
  return html||'<div class="empty">No sessions match your search.</div>';
}
function tableCard(code){
  const tk=code.slice(0,3),meta=SESSIONS[code];
  const talks=sessionTalks(code);
  const cc=counts(talks);
  const svg=tableSVG(code,talks);
  const room=(meta.venue?meta.venue:"")+(meta.room?(" · "+meta.room):"");
  return `<div class="table ${cc.outstanding?'gap':'done'}" onclick="openTable('${code}')">
    <div class="table-top"><div class="tcode">${code}</div><div class="tbadge ${cc.outstanding?'':'done'}">${cc.outstanding?cc.outstanding+' open':'Complete'}</div></div>
    ${svg}
    <div class="tname" title="${esc(meta.name)}">${esc(meta.name)}</div>
    <div class="table-meta"><span>${PS_DAY[meta.num]} · ${esc(meta.time)}</span><span>${esc(room)}</span></div></div>`;
}
function tableSVG(code,talks){
  const tk=code.slice(0,3);const n=talks.length;const cx=64,cy=57,R=43,sr=7.5,tr=25;
  const pendingPattern=`pending-hatch-${code.replace(/[^a-z0-9]/gi,"-")}`;
  let seats="";
  talks.forEach((s,i)=>{const st=effStatus(s);const a=(-90+i*360/Math.max(n,1))*Math.PI/180;
    const x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);
    const pendingFill=st==="pending"?` style="fill:url(#${pendingPattern})"`:"";
    seats+=`<circle class="seat ${SMETA[st].seat}"${pendingFill} cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${sr}" onclick="event.stopPropagation();openTable('${code}','${s.id}')"><title>${esc(displaySurname(s))} — ${SMETA[st].label}</title></circle>`;});
  return `<svg class="tsvg" width="128" height="114" viewBox="0 0 128 114" aria-label="${code}, ${n} presentations">
    <defs><pattern id="${pendingPattern}" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="var(--pend-bg)"></rect>
      <line x1="0" y1="0" x2="0" y2="5" stroke="var(--pend)" stroke-width="2"></line>
    </pattern></defs>
    <circle class="ttop" cx="${cx}" cy="${cy}" r="${tr}" stroke="var(--${tk})"></circle>
    <text x="${cx}" y="${cy+3}" text-anchor="middle" font-size="12" font-weight="650" fill="#1d1d1f">${n}</text>
    ${seats}</svg>`;
}
function wireTables(){
  const q=document.getElementById("rq");q.oninput=()=>{roomQ=q.value;document.getElementById("roomBody").innerHTML=roomBody()};
  document.getElementById("rfocus").onchange=e=>{roomFocus=e.target.checked;document.getElementById("roomBody").innerHTML=roomBody()};

function listRows(){let L=SUBMISSIONS.filter(s=>matchQ(s,lQ));

/* ---------- RECORD DETAILS ---------- */
function statusLabel(k){return SMETA[k]?.label||k||"—"}
function fmtDateTime(iso){if(!iso)return"Never";try{return new Date(iso).toLocaleString([], {year:"numeric",month:"short",day:"2-digit",hour:"2-digit",minute:"2-digit"})}catch(e){return iso}}
function snapshotWithReview(s,r){
  return {
    status:r.status||autoStatus(s),
    session:hasSessionOverride(r)?(r.session||""):autoSession(s)||"",

}
function displayValue(field,value){
  if(field==="status")return statusLabel(value);

}
function sessionOptions(s){

function statusOptions(s){

    ORD.map(k=>`<option value="${k}" ${selected===k?"selected":""}>${SMETA[k].label}</option>`).join("");

function reviewHistory(id){return REVIEW_STATE.history.filter(h=>h.id===id)}
function historyHTML(id){
  const H=reviewHistory(id);
  if(!H.length)return `<div class="history-empty">No manual edit history for this record yet.</div>`;
  return `<div class="history-list">${H.map(h=>`<div class="history-item"><b>${fmtDateTime(h.at)}</b><br>${h.changes.map(c=>`${esc(c.label)}: ${esc(displayValue(c.field,c.from))} → ${esc(displayValue(c.field,c.to))}`).join("<br>")}</div>`).join("")}</div>`;
}
function saveRecordReview(id){
  const s=byId[id],beforeReview={...manualReview(s)},before=snapshotWithReview(s,beforeReview);
  const next={};
  const st=document.getElementById("reviewStatus").value;
  const sess=document.getElementById("reviewSession").value;
  const memo=document.getElementById("reviewNote").value.trim();
  if(st)next.status=st;
  if(sess!=="__auto")next.session=sess==="__none"?"":sess;
  if(memo)next.note=memo;
  const after=snapshotWithReview(s,next);
  const changes=[];
  [["status","Status"],["session","Session"],["note","Manual note"]].forEach(([field,label])=>{
    if((before[field]||"")!==(after[field]||""))changes.push({field,label,from:before[field]||"",to:after[field]||""});
  });
  if(!changes.length){toast("No manual changes to save");return;}
  const at=new Date().toISOString();
  if(next.status||hasSessionOverride(next)||next.note){next.updatedAt=at;REVIEW_STATE.records[id]=next;}else{delete REVIEW_STATE.records[id];}
  REVIEW_STATE.history.unshift({id,title:s.title,at,changes});
  REVIEW_STATE.history=REVIEW_STATE.history.slice(0,1500);
  const saved=saveReviewState();
  syncSaveRemote(id,next,changes,false);
  render();
  openRecord(id);
  toast(syncEnabled()?"Manual review saved; syncing online":(saved?"Manual review saved":"Saved for this session only"));
}
function resetRecordReview(id){
  const s=byId[id],beforeReview={...manualReview(s)};
  if(!isEdited(s)){toast("No manual edit to reset");return;}
  if(!confirm("Reset the manual edit for this submission? The reset action will stay in the history."))return;
  const before=snapshotWithReview(s,beforeReview),after=snapshotWithReview(s,{});
  const changes=[];
  [["status","Status"],["session","Session"],["note","Manual note"]].forEach(([field,label])=>{
    if((before[field]||"")!==(after[field]||""))changes.push({field,label,from:before[field]||"",to:after[field]||""});
  });
  delete REVIEW_STATE.records[id];
  REVIEW_STATE.history.unshift({id,title:s.title,at:new Date().toISOString(),changes});
  const saved=saveReviewState();
  syncSaveRemote(id,{},changes,true);
  render();
  openRecord(id);
  toast(syncEnabled()?"Manual edit reset; syncing online":(saved?"Manual edit reset":"Reset for this session only"));
}

  document.getElementById("modal").innerHTML=`

      <div class="mh-code">Submission · ${s.id}</div>
      <div class="mh-name">${esc(s.title)}</div>
      <div class="mh-sub">${esc(displayAuthors(s))} · ${esc(s.track)} · ${esc(s.decision)}</div>
    </div>
    <div class="m-body review-form">
      <div class="compare-grid">
        <div><span>Registration status</span><b>${statusLabel(effStatus(s))}</b></div>
        <div><span>Session</span><b>${session||"Not scheduled"}</b></div>
        <div><span>Day and time</span><b>${sessionMeta.day?`${sessionMeta.day} · ${sessionMeta.time}`:"—"}</b></div>
        <div><span>Registration evidence</span><b>${esc(registrationEvidence)}</b></div>
      </div>
      ${knownBlock}${eligibilityBlock}
      <div class="manual-panel">
        <h3>Manual review</h3>
        <div class="manual-help">Manual changes are saved in this browser only. They overlay the source data and keep a timestamped history, so the original interpretation can still be compared.</div>
        <div class="compare-grid">
          <div><span>Auto status</span><b>${statusLabel(autoStatus(s))}</b></div>
          <div><span>Auto session</span><b>${esc(autoSession(s)||"Not scheduled")}</b></div>
        </div>
        <div class="manual-grid">

          <label>Reviewed session

          </label>
          <label style="grid-column:1/-1">Review note

        </div>

      </div>

    </div>

}

function saveSyncSettingsFromForm(){

      <div class="mini-list" style="margin-top:8px">${historyRows||'<span class="history-empty">No manual edits saved yet.</span>'}</div>
    </div>
    <div class="special-card"><h3>Organiser decisions applied</h3>
      <div class="desc"><b>Yuqi Chen:</b> submission <code class="k">999904</code> is retained only in student competition session <code class="k">GSC-1</code>; its UPS-2 duplicate is suppressed. Submission <code class="k">4861</code> remains registered in LEA-5. Decision labels such as REJECT, REMOVE, PAID, and UNPAID are retained as source metadata but are not used to override registration status.</div></div>

      <div class="desc">The organiser-confirmed names <b>Wei Luo, Hao Li, and Siyuan Kang</b> account for four source-open submissions. The full-paper reviewer roster adds six source-open submissions, and the keynote author check adds four. Another 12 waiver-eligible submissions already have matched payment evidence and remain Registered.</div></div>

    <details class="review-detail"><summary>Full-paper reviewer cross-check <span>10 reviewers · 13 matched submissions</span></summary><div class="detail-body">

/* ---------- export ---------- */
function download(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function csvCell(v){v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function stamp(){const d=new Date(),p=n=>String(n).padStart(2,"0");return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())}
function exportCSV(){const cols=["ID","Title","Source_Authors","Verified_Author","Author_Evidence","Track","Decision","Final_Session_ID","Session_Name","Day","Time","Venue","Room","Source_Reg_Blank","Auto_Registration_Status","Auto_Session_ID","Registration_Status","Manual_Status_Override","Manual_Session_Override","Manual_Note","Manual_Updated_At","Manual_History_Count","Verified_Note","Note_Source","Related_Submissions","Review_Flags","Also_in"];
  let out=[cols.join(",")];SUBMISSIONS.forEach(s=>{const session=finalSession(s),m=SESSIONS[session]||{},k=knownInfo(s),e=eligibilityInfo(s);
    const r=manualReview(s),manualSession=hasSessionOverride(r)?(r.session||"Not scheduled"):"";
    out.push([s.id,s.title,s.authors,k.realName||"",k.nameSource||"",s.track,s.decision,session,m.name||"",m.day||"",m.time||"",m.venue||"",m.room||"",!s.baseRegistered,statusLabel(autoStatus(s)),autoSession(s)||"",statusLabel(effStatus(s)),r.status?statusLabel(r.status):"",manualSession,r.note||"",r.updatedAt||"",reviewHistory(s.id).length,[k.note,e.note].filter(Boolean).join(" "),[k.source,e.source].filter(Boolean).join("; "),(k.related||[]).join(";"),flags(s).map(x=>FLAG_META[x].label).join(";"),finalAlsoIn(s).join(";")].map(csvCell).join(","))});
  download("CPGIS_2026_registration_status_"+stamp()+".csv","\uFEFF"+out.join("\r\n"),"text/csv;charset=utf-8");toast("CSV exported");}
function exportManualCSV(){const cols=["Changed_At","ID","Title","Field","Previous_Value","New_Value","Current_Status","Current_Session","Current_Manual_Note"];
  const out=[cols.join(",")];
  REVIEW_STATE.history.forEach(h=>{const s=byId[h.id]||{},r=s.id?manualReview(s):{};h.changes.forEach(c=>out.push([h.at,h.id,h.title||s.title||"",c.label,displayValue(c.field,c.from),displayValue(c.field,c.to),s.id?statusLabel(effStatus(s)):"",s.id?(finalSession(s)||"Not scheduled"):"",r.note||""].map(csvCell).join(",")))});
  download("CPGIS_2026_manual_edit_history_"+stamp()+".csv","\uFEFF"+out.join("\r\n"),"text/csv;charset=utf-8");toast("Manual edit history exported");}
function exportManualJSON(){
  download("CPGIS_2026_manual_review_backup_"+stamp()+".json",JSON.stringify(REVIEW_STATE,null,2),"application/json;charset=utf-8");
  toast("Manual review backup exported");
}

let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1700)}
function closeModal(){document.getElementById("overlay").classList.remove("show");openCode=null}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
document.getElementById("gen").textContent="data "+GENERATED;
render();
setTimeout(()=>syncLoadRemote(false),0);
